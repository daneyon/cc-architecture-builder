# A-Team Database: Universal Product Team → CC Component Mapping
# Version: 0.2.0-draft
# Purpose: Machine-parseable roster for agentic team formation workflows.
#          An orchestrator or team-formation skill reads this file to
#          assemble a project-tailored team of CC subagents and skills.
#
# Schema:
#   roles[]:        Full roster of product team roles
#     .id:          Unique kebab-case identifier
#     .title:       Human-readable role name
#     .tier:        Organizational tier (1=leadership, 2=definition, 3=engineering, 4=quality, 5=operations)
#     .discipline:  Functional discipline grouping
#     .phases:      List of product design cycle phase IDs (0-6) where role is active
#     .key_deliverables: Primary outputs this role is responsible for
#     .cc_mapping:  How this role maps to Claude Code components
#       .primary_type:   skill | agent | command | rules | hook | native
#       .component_name: Proposed CC component name (follows naming conventions)
#       .rationale:      Why this CC type was chosen
#       .skills_loaded:  Skills the agent references (if primary_type=agent)
#     .scaling:     At which team size this role typically appears
#       .solo:      Whether AI augments this role for solo developer
#       .small:     Active at 3-5 person team
#       .medium:    Active at 6-15 person team
#       .enterprise: Active at 15+ person team

phases:
  - id: 0
    name: "Discovery"
    purpose: "Problem identification, feasibility assessment, stakeholder alignment"
    gate: "Problem validated, feasibility confirmed, stakeholders aligned"
  - id: 1
    name: "Strategy & Planning"
    purpose: "Product vision, roadmap, requirements, resource planning"
    gate: "PRD approved, roadmap committed, resources allocated"
  - id: 2
    name: "Architecture & Design"
    purpose: "System design, UX/UI design, technical specifications"
    gate: "Architecture approved, designs signed off, specs complete"
  - id: 3
    name: "Implementation"
    purpose: "Code development, integration, iterative feature delivery"
    gate: "Features complete, code reviewed, integration tested"
  - id: 4
    name: "Validation & QA"
    purpose: "Testing, quality assurance, performance validation, security audit"
    gate: "All tests pass, performance benchmarks met, security cleared"
  - id: 5
    name: "Deployment & Launch"
    purpose: "Release preparation, deployment execution, GTM launch"
    gate: "Deployed to production, monitoring active, launch executed"
  - id: 6
    name: "Operations & Growth"
    purpose: "Monitoring, optimization, feedback incorporation, scaling"
    gate: "Ongoing (no terminal gate)"

disciplines:
  - id: leadership
    name: "Business Leadership & Strategy"
  - id: product
    name: "Product Management"
  - id: project
    name: "Project Management"
  - id: design
    name: "UX/UI Design"
  - id: engineering
    name: "Software Engineering"
  - id: data
    name: "Data Engineering & Analytics"
  - id: quality
    name: "Quality Assurance"
  - id: security
    name: "Security & Compliance"
  - id: operations
    name: "DevOps & Operations"
  - id: marketing
    name: "Marketing & Communications"
  - id: support
    name: "Customer Success & Support"
  - id: documentation
    name: "Technical Writing & Documentation"

