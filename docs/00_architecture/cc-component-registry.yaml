# ============================================================
# HOOKS (Event-driven automation, zero context cost)
# ============================================================

hooks:
  - name: pre-commit-quality
    status: proposed
    event: pre-commit
    description: "Run linting, type checking, and basic quality gates before commit"
    priority: p1

  - name: post-session-export
    status: proposed
    event: session-end
    description: "Auto-export session summary to project knowledge base"
    priority: p2

  - name: post-tool-format
    status: proposed
    event: "PostToolUse (Write|Edit)"
    description: "Auto-format code after Claude writes/edits files to catch formatting edge cases and prevent CI failures."
    priority: p1
    source: "Boris Cherny Tip #9 — CC team uses this to catch the 10% of cases where formatting is off"

# ============================================================
# EXPERIMENTAL FEATURES
# ============================================================

experimental:
  agent_teams:
    env_var: "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS"
    status: research_preview
    token_multiplier: "~15x vs chat"
    recommended_team_size: "2-5 teammates"
    notes: "Use worktrees for most parallel work. Agent Teams only when inter-agent messaging is required."

  sandbox:
    command: "/sandbox"
    modes: ["sandbox-auto-allow", "sandbox-with-permissions", "no-sandbox"]
    platforms: ["macOS", "Linux"]
    notes: "Windows support pending. Enables file and network isolation."

