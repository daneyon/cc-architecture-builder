# CC Component Registry: All Proposed Global Config Components
# Version: 0.2.0-draft
# Purpose: Single source of truth for all CC components in the standardized
#          global config. Machine-parseable for agentic workflows.
#
# This registry is the canonical list. Any tool that needs to know
# "what CC components exist" reads this file.
#
# Schema:
#   {component_type}[]:
#     .name:          Canonical name (follows naming conventions)
#     .status:        proposed | scaffolded | implemented | active
#     .mapped_roles:  Role IDs from a-team-database.yaml this component serves
#     .phases:        Product design cycle phases where this component is used
#     .description:   What this component does (also used as CC metadata description)
#     .priority:      p0 (must have) | p1 (should have) | p2 (nice to have)

# ============================================================
# RULES (Always loaded, recursive subdirectory discovery)
# Budget: ~2-5k tokens total for ALL rules files combined
# ============================================================

